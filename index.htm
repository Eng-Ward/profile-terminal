<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eng-Ward | Terminal Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: 'Fira Code', monospace;
    }

    .terminal {
      width: 100%;
      max-width: 760px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .terminal-bar {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #ffbd2e; }
    .dot.g { background: #28c840; }

    .bar-title {
      flex: 1;
      text-align: center;
      color: #8b949e;
      font-size: 13px;
    }

    .terminal-body {
      padding: 24px 28px 32px;
      min-height: 600px;
    }

    .line {
      font-size: 14px;
      line-height: 1.85;
      white-space: pre;
    }

    .prompt  { color: #58a6ff; }
    .cmd     { color: #e6edf3; }
    .comment { color: #8b949e; }
    .green   { color: #3fb950; }
    .cyan    { color: #39d353; }
    .purple  { color: #bc8cff; }
    .orange  { color: #f78166; }
    .white   { color: #e6edf3; }
    .muted   { color: #6e7681; }
    .accent  { color: #79c0ff; }
    .warn    { color: #e3b341; }
    .banner  { color: #58a6ff; font-size: 12px; line-height: 1.3; }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 15px;
      background: #58a6ff;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .tag {
      display: inline-block;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      padding: 1px 8px;
      font-size: 12px;
      color: #e6edf3;
      margin: 2px 3px 2px 0;
    }

    .gap { margin-top: 4px; }
  </style>
</head>
<body>
<div class="terminal">
  <div class="terminal-bar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <span class="bar-title">Eng-Ward ~ profile.sh</span>
  </div>
  <div class="terminal-body" id="out"></div>
</div>

<script>
const LINES = [
  { delay: 0,    html: `<div class="line banner">██╗    ██╗ █████╗ ██████╗ ██████╗ </div>` },
  { delay: 60,   html: `<div class="line banner">██║    ██║██╔══██╗██╔══██╗██╔══██╗</div>` },
  { delay: 120,  html: `<div class="line banner">██║ █╗ ██║███████║██████╔╝██║  ██║</div>` },
  { delay: 180,  html: `<div class="line banner">██║███╗██║██╔══██║██╔══██╗██║  ██║</div>` },
  { delay: 240,  html: `<div class="line banner">╚███╔███╔╝██║  ██║██║  ██║██████╔╝</div>` },
  { delay: 300,  html: `<div class="line banner"> ╚══╝╚══╝ ╚═╝  ╚═╝╚═╝  ╚═╝╚═════╝ </div>` },
  { delay: 360,  html: `<div class="line muted">─────────────────────────────────────────────</div>` },

  { delay: 500,  html: `<div class="line gap"><span class="prompt">❯</span> <span class="cmd">cat about.json</span></div>` },
  { delay: 700,  html: `<div class="line"><span class="muted">{</span></div>` },
  { delay: 780,  html: `<div class="line">  <span class="purple">"name"</span>       : <span class="green">"Ward Barghouthi"</span><span class="muted">,</span></div>` },
  { delay: 860,  html: `<div class="line">  <span class="purple">"age"</span>        : <span class="warn">21</span><span class="muted">,</span></div>` },
  { delay: 940,  html: `<div class="line">  <span class="purple">"title"</span>      : <span class="green">"CS Graduate | Aspiring Cyber Professional"</span><span class="muted">,</span></div>` },
  { delay: 1020, html: `<div class="line">  <span class="purple">"location"</span>   : <span class="green">"Ramallah, Palestine 🇵🇸"</span><span class="muted">,</span></div>` },
  { delay: 1100, html: `<div class="line">  <span class="purple">"status"</span>     : <span class="green">"Open to opportunities"</span></div>` },
  { delay: 1160, html: `<div class="line"><span class="muted">}</span></div>` },

  { delay: 1320, html: `<div class="line gap"><span class="prompt">❯</span> <span class="cmd">cat education.log</span></div>` },
  { delay: 1500, html: `<div class="line"><span class="cyan">◉</span>  <span class="accent">Bachelor of Science</span>  <span class="muted">───────────────────────</span></div>` },
  { delay: 1580, html: `<div class="line">   <span class="white">University </span>  <span class="green">Birzeit University</span></div>` },
  { delay: 1660, html: `<div class="line">   <span class="white">Degree     </span>  <span class="green">BSc — Computer Science</span></div>` },
  { delay: 1740, html: `<div class="line">   <span class="white">Status     </span>  <span class="warn">🎓 Completed</span></div>` },

  { delay: 1900, html: `<div class="line gap"><span class="prompt">❯</span> <span class="cmd">ls certificates/</span></div>` },
  { delay: 2080, html: `<div class="line"><span class="muted">total 0</span></div>` },
  { delay: 2140, html: `<div class="line"><span class="comment"># No certificates yet — that changes soon.</span></div>` },

  { delay: 2320, html: `<div class="line gap"><span class="prompt">❯</span> <span class="cmd">cat roadmap.sh</span></div>` },
  { delay: 2500, html: `<div class="line"><span class="comment">#!/bin/bash  — Cybersecurity Certification Roadmap</span></div>` },
  { delay: 2580, html: `<div class="line gap"><span class="cyan">PHASE 1</span>  <span class="muted">— Foundation</span></div>` },
  { delay: 2660, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="warn">CompTIA Security+</span>      <span class="muted"># Industry baseline</span></div>` },
  { delay: 2740, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="warn">CompTIA Network+</span>       <span class="muted"># Networking fundamentals</span></div>` },
  { delay: 2820, html: `<div class="line gap"><span class="cyan">PHASE 2</span>  <span class="muted">— Specialisation</span></div>` },
  { delay: 2900, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="orange">CEH</span>                    <span class="muted"># Certified Ethical Hacker</span></div>` },
  { delay: 2980, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="orange">eJPT / eCPPT</span>           <span class="muted"># Practical penetration testing</span></div>` },
  { delay: 3060, html: `<div class="line gap"><span class="cyan">PHASE 3</span>  <span class="muted">— Advanced</span></div>` },
  { delay: 3140, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="purple">OSCP</span>                   <span class="muted"># Offensive Security — elite cert</span></div>` },
  { delay: 3220, html: `<div class="line">  <span class="muted">[ ]</span>  <span class="purple">CISSP</span>                  <span class="muted"># Gold standard for senior roles</span></div>` },

  { delay: 3400, html: `<div class="line gap"><span class="prompt">❯</span> <span class="cmd">cat interests.txt</span></div>` },
  { delay: 3580, html: `<div class="line"><span class="tag">🛡️ Ethical Hacking</span><span class="tag">🔍 Penetration Testing</span><span class="tag">🌐 Network Security</span></div>` },
  { delay: 3640, html: `<div class="line"><span class="tag">🔐 Cryptography</span><span class="tag">🧠 CTF Challenges</span><span class="tag">⚙️ Linux</span></div>` },

  { delay: 3820, html: `<div class="line gap"><span class="prompt">❯</span> <span class="cursor"></span></div>` },
];

const out = document.getElementById('out');
LINES.forEach(({ delay, html }) => {
  setTimeout(() => {
    out.insertAdjacentHTML('beforeend', html);
  }, delay);
});
</script>
</body>
</html>
